<!DOCTYPE html>
<html lang="de-CH">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LANDI BUCHSI MASTER 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slideUp { animation: slideUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- KONFIGURATION ---
        // HINWEIS: Füge hier deinen API-Key ein oder nutze die Vercel Env Vars
        const API_KEY = "AIzaSyD_tYDy9keArZfb3Yj2O50SuCqYLDtqFk0"; 
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;

        // --- ICONS (Inline SVG für maximale Kompatibilität) ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                Shield: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
                Search: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
                Chat: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>,
                Send: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>,
                X: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l18 18" /></svg>,
                Oil: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" /></svg>,
                Battery: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" /></svg>
            };
            return icons[name] || null;
        };

        const App = () => {
            const [selectedModel, setSelectedModel] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [showChat, setShowChat] = useState(false);
            const [isTyping, setIsTyping] = useState(false);
            const [chatHistory, setChatHistory] = useState([
                { role: 'ai', text: 'Grüezi Oli! Ich bin dein digitaler Landi-Experte für Herzogenbuchsee. Wie kann ich dir helfen?' }
            ]);
            const [userInput, setUserInput] = useState('');
            const chatEndRef = useRef(null);

            const mowers = [
                {
                    id: "101443", name: "Okay RM500", fullName: "Rasenmäher Roboter RM500 Okay", category: "Roboter", price: "259.00",
                    specs: { "Fläche": "500 m²", "Breite": "16 cm", "Steigung": "26.8%", "Akku": "20 V / 2 Ah" },
                    consumables: { blade: "73818", wire: "73817" },
                    description: "Einsteiger-Roboter, leise und zuverlässig."
                },
                {
                    id: "100791", name: "Okay Titan II", fullName: "Benzinmäher Titan II E-Start 6 PS", category: "Benzin", price: "499.00",
                    specs: { "Leistung": "6 PS", "Breite": "53 cm", "Antrieb": "Radantrieb", "Start": "E-Start" },
                    consumables: { oil: "13174 (SAE 30)", fuel: "39659 (Oecofuel 4)" },
                    description: "Kraftpaket für grosse Flächen bis 2000 m²."
                },
                {
                    id: "100789", name: "Okay Apollo II", fullName: "Benzinmäher Apollo II 4 PS", category: "Benzin", price: "349.00",
                    specs: { "Leistung": "4 PS", "Breite": "51 cm", "Antrieb": "Ja" },
                    consumables: { oil: "13174 (SAE 30)", blade: "14364" },
                    description: "Robuster Allrounder für mittlere Gärten."
                },
                {
                    id: "56713", name: "Okay 120 V", fullName: "Akku-Rasenmäher Okay 120 V", category: "Akku", price: "459.00",
                    specs: { "Spannung": "120 V", "Breite": "51 cm", "Antrieb": "Ja" },
                    consumables: { battery: "56714", blade: "14364" },
                    description: "Benzin-Power ohne Abgase. Extrem kraftvoll."
                }
            ];

            const askAI = async (query) => {
                if (!API_KEY) {
                    setChatHistory(prev => [...prev, { role: 'ai', text: "Fehler: Kein API-Key gefunden. Bitte im Code einfügen." }]);
                    return;
                }
                setIsTyping(true);
                const systemPrompt = `Du bist Landi-Experte für Buchsi. Berate auf Hochdeutsch. Wissen: ${JSON.stringify(mowers)}. Nenne immer Art.Nr.`;
                
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: query }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const data = await response.json();
                    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Information nicht gefunden.";
                    setChatHistory(prev => [...prev, { role: 'ai', text: aiText }]);
                } catch (e) {
                    setChatHistory(prev => [...prev, { role: 'ai', text: "Verbindungsfehler." }]);
                } finally {
                    setIsTyping(false);
                }
            };

            const handleSend = () => {
                if (!userInput.trim()) return;
                const msg = userInput;
                setChatHistory(prev => [...prev, { role: 'user', text: msg }]);
                setUserInput('');
                askAI(msg);
            };

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [chatHistory]);

            const filtered = mowers.filter(m => m.fullName.toLowerCase().includes(searchTerm.toLowerCase()) || m.id.includes(searchTerm));

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <nav className="bg-white border-b-4 border-green-700 shadow-lg p-6 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-green-700 text-white p-2 rounded-lg"><Icon name="Shield" /></div>
                                <h1 className="text-xl font-black">LANDI BUCHSI MASTER</h1>
                            </div>
                            <div className="flex gap-4">
                                <input 
                                    type="text" 
                                    placeholder="Suche..." 
                                    className="bg-slate-100 rounded-xl px-4 py-2 outline-none focus:ring-2 ring-green-600"
                                    value={searchTerm}
                                    onChange={e => setSearchTerm(e.target.value)}
                                />
                                <button onClick={() => setShowChat(!showChat)} className="bg-green-700 text-white p-2 rounded-xl">
                                    <Icon name="Chat" />
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto p-6">
                        {/* Chat Bot UI */}
                        {showChat && (
                            <div className="fixed bottom-6 right-6 w-full max-w-sm bg-white rounded-3xl shadow-2xl border-4 border-green-700 overflow-hidden z-[100] animate-slideUp">
                                <div className="bg-green-700 p-4 text-white font-black flex justify-between">
                                    <span>KI-BERATER</span>
                                    <button onClick={() => setShowChat(false)}>X</button>
                                </div>
                                <div className="h-96 overflow-y-auto p-4 space-y-4 no-scrollbar bg-slate-50">
                                    {chatHistory.map((msg, i) => (
                                        <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`p-3 rounded-2xl text-sm ${msg.role === 'user' ? 'bg-green-600 text-white' : 'bg-white border border-slate-200'}`}>
                                                {msg.text}
                                            </div>
                                        </div>
                                    ))}
                                    {isTyping && <div className="text-xs animate-pulse font-bold text-green-600">Experte schreibt...</div>}
                                    <div ref={chatEndRef} />
                                </div>
                                <div className="p-4 border-t flex gap-2">
                                    <input value={userInput} onChange={e => setUserInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSend()} placeholder="Frag mich was..." className="flex-1 border rounded-full px-4 py-1" />
                                    <button onClick={handleSend} className="bg-green-700 text-white p-2 rounded-full"><Icon name="Send" className="w-4 h-4" /></button>
                                </div>
                            </div>
                        )}

                        {/* Mower Grid */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            {filtered.map(m => (
                                <div key={m.id} onClick={() => setSelectedModel(m)} className="bg-white p-6 rounded-3xl shadow-md border hover:border-green-600 cursor-pointer transition-all">
                                    <span className="text-[10px] font-black text-slate-400">ART. {m.id}</span>
                                    <h3 className="text-lg font-black mb-4">{m.name}</h3>
                                    <p className="text-xs text-slate-500 mb-6">{m.description}</p>
                                    <div className="text-xl font-black">CHF {m.price}</div>
                                </div>
                            ))}
                        </div>

                        {/* Detail Modal */}
                        {selectedModel && (
                            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-[200]">
                                <div className="bg-white rounded-[3rem] p-10 max-w-2xl w-full relative animate-slideUp">
                                    <button onClick={() => setSelectedModel(null)} className="absolute top-6 right-6 text-slate-400"><Icon name="X" /></button>
                                    <h2 className="text-4xl font-black mb-8">{selectedModel.fullName}</h2>
                                    <div className="grid grid-cols-2 gap-4 mb-8">
                                        {Object.entries(selectedModel.specs).map(([k,v]) => (
                                            <div key={k} className="bg-slate-50 p-4 rounded-2xl">
                                                <div className="text-[10px] font-black text-slate-400 uppercase">{k}</div>
                                                <div className="font-bold">{v}</div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="bg-green-700 text-white p-6 rounded-3xl">
                                        <h4 className="font-black mb-2">Original-Zubehör Art.Nr.</h4>
                                        <div className="text-sm opacity-90">{JSON.stringify(selectedModel.consumables)}</div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
