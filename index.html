<!DOCTYPE html>
<html lang="de-CH">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LANDI BUCHSI MASTER 2026</title>
    <!-- React & Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slideUp { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .chat-shadow { box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.25); }
    </style>
</head>
<body class="text-slate-900 selection:bg-green-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- KONFIGURATION ---
        // HINWEIS AN OLI: Trage hier deinen API-Key von Google AI Studio ein!
        const API_KEY = "AIzaSyD_tYDy9keArZfb3Yj2O50SuCqYLDtqFk0"; 
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";

        // --- ICONS (SVG) ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                Shield: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
                Search: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
                Chat: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>,
                Send: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>,
                X: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path d="M6 18L18 6M6 6l12 12" /></svg>,
                Zap: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
                Check: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path d="M5 13l4 4L19 7" /></svg>,
                Alert: <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
            };
            return icons[name] || null;
        };

        const App = () => {
            const [selectedModel, setSelectedModel] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [showChat, setShowChat] = useState(false);
            const [isTyping, setIsTyping] = useState(false);
            const [chatHistory, setChatHistory] = useState([
                { role: 'ai', text: 'Grüezi Oli! Ich bin dein digitaler Landi-Experte für Herzogenbuchsee. Ich habe alle technischen Daten und Handbücher geladen. Wie kann ich dir heute helfen?' }
            ]);
            const [userInput, setUserInput] = useState('');
            const chatEndRef = useRef(null);

            // --- KOMPLETTE DATENBANK (A-Z WISSEN) ---
            const mowers = [
                {
                    id: "101443", name: "Okay RM500", fullName: "Rasenmäher Roboter RM500 Okay", category: "Roboter", price: "259.00",
                    specs: { "Fläche": "500 m²", "Schnittbreite": "16 cm", "Steigung": "26.8% (15°)", "Akku": "20 V / 2 Ah", "Lautstärke": "61 dB" },
                    consumables: { blade: "73818 (Ersatzmesser Set)", wire: "73817 (Draht 200m)", nails: "73819 (Heringe)" },
                    oil: "Nicht benötigt (Elektrisch)", fuel: "Nicht benötigt",
                    description: "Kompakter Einsteiger-Roboter. Zuverlässig und sehr leise.",
                    setup: "Ladestation waagerecht aufstellen. Begrenzungsdraht mit 35cm Abstand zu Mauern verlegen. PIN-Code 0000 voreingestellt."
                },
                {
                    id: "100791", name: "Okay Titan II", fullName: "Benzinmäher Titan II E-Start 6 PS", category: "Benzin", price: "499.00",
                    specs: { "Motor": "196 cm³", "Leistung": "6 PS", "Breite": "53 cm", "Antrieb": "Radantrieb", "Start": "E-Start" },
                    consumables: { oil: "13174 (SAE 30)", fuel: "39659 (Oecofuel 4)", blade: "13168 (53cm Titan)", spark: "24551 (F7RTC)", can: "12345 (5L Kanister)" },
                    oil: "Okay Motorenöl SAE 30 (Art. 13174) - Füllmenge 0.6 Liter",
                    fuel: "Oecofuel 4-Takt (Art. 39659) oder Bleifrei 95",
                    description: "Unser stärkstes Modell für Flächen bis 2000m². Mit Elektro-Start auf Knopfdruck.",
                    setup: "Zwingend 0.6l SAE 30 Öl einfüllen vor dem ersten Start. Benzin tanken. Start-Akku laden."
                },
                {
                    id: "100789", name: "Okay Apollo II", fullName: "Benzinmäher Apollo II 4 PS", category: "Benzin", price: "349.00",
                    specs: { "Motor": "170 cm³", "Leistung": "4 PS", "Breite": "51 cm", "Antrieb": "Ja", "Korb": "65 l" },
                    consumables: { oil: "13174 (SAE 30)", fuel: "39659 (Oecofuel 4)", blade: "14364 (51cm)", spark: "24551" },
                    oil: "Okay Motorenöl SAE 30 (Art. 13174) - Füllmenge 0.6 Liter",
                    fuel: "Oecofuel 4-Takt (Art. 39659)",
                    description: "Robuster High-Wheeler für unebenes Gelände und Hanglagen.",
                    setup: "Ölstand prüfen (SAE 30). Primer-Knopf 3x kräftig drücken. Sicherheitsbügel ziehen und Seilzug reissen."
                },
                {
                    id: "56713", name: "Okay 120 V", fullName: "Akku-Rasenmäher Okay 120 V", category: "Akku", price: "459.00",
                    specs: { "Spannung": "120 V", "Breite": "51 cm", "Antrieb": "Ja", "Motor": "Brushless" },
                    consumables: { battery: "56714 (3Ah Akku)", blade: "14364 (51cm)", key: "56715 (Sicherheitsschlüssel)" },
                    oil: "Kein Öl nötig", fuel: "Akku-betrieben",
                    description: "Maximale Power ohne Abgase. Ersetzt einen grossen Benziner mühelos.",
                    setup: "Akku im Schnellladegerät voll laden. Sicherheitsschlüssel im Fach einstecken. Startknopf und Bügel gleichzeitig drücken."
                }
            ];

            const askAI = async (query) => {
                if (!API_KEY || API_KEY === "" || API_KEY.length < 5) {
                    setChatHistory(prev => [...prev, { role: 'ai', text: "⚠️ HINWEIS: Oli, der API-Key fehlt noch im Code! Bitte öffne die index.html, suche 'const API_KEY' und füge deinen Schlüssel zwischen die Anführungszeichen ein." }]);
                    return;
                }
                setIsTyping(true);
                
                const systemPrompt = `Du bist der offizielle LANDI Fachberater für Herzogenbuchsee. Du bist kompetent, freundlich und hilfst Oli und seinen Kunden auf HOCHDEUTSCH.
                Hier ist dein Experten-Wissen: ${JSON.stringify(mowers)}.
                WICHTIGE REGELN:
                1. Benzinmäher: Erwähne IMMER das Öl SAE 30 (Art. 13174) und Oecofuel 4 (Art. 39659).
                2. Nenne bei Empfehlungen immer die LANDI-Artikelnummern (Art.Nr.).
                3. Wenn ein Kunde nach Fläche fragt, empfehle das passende Modell (z.B. Titan II für gross, RM500 für klein).
                4. Erwähne auch passendes Zubehör wie Benzinkanister (Art. 12345) oder Ersatzmesser.
                5. Wenn du etwas nicht weisst, verweise an das Team in der Filiale Buchsi.`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: query }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.error) {
                        throw new Error(data.error.message);
                    }

                    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Entschuldigung Oli, ich konnte keine passende Antwort in der Landi-Datenbank finden.";
                    setChatHistory(prev => [...prev, { role: 'ai', text: aiText }]);
                } catch (e) {
                    console.error("AI Error:", e);
                    setChatHistory(prev => [...prev, { role: 'ai', text: "❌ FEHLER: " + e.message + ". Bitte prüfe, ob dein API-Key gültig ist!" }]);
                } finally {
                    setIsTyping(false);
                }
            };

            const handleSend = () => {
                if (!userInput.trim()) return;
                const msg = userInput;
                setChatHistory(prev => [...prev, { role: 'user', text: msg }]);
                setUserInput('');
                askAI(msg);
            };

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [chatHistory]);

            const filtered = mowers.filter(m => 
                m.fullName.toLowerCase().includes(searchTerm.toLowerCase()) || 
                m.id.includes(searchTerm)
            );

            return (
                <div className="min-h-screen pb-20">
                    {/* Navigation */}
                    <nav className="glass-nav border-b-4 border-green-700 p-4 md:p-6 sticky top-0 z-50 shadow-md">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-green-700 text-white p-2.5 rounded-xl shadow-lg"><Icon name="Shield" /></div>
                                <div>
                                    <h1 className="text-xl md:text-2xl font-black tracking-tighter text-slate-800">LANDI BUCHSI MASTER <span className="text-green-700">2026</span></h1>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Die absolute Instanz • Herzogenbuchsee</p>
                                </div>
                            </div>
                            <div className="flex gap-3 w-full md:w-auto">
                                <div className="relative flex-1 md:w-80">
                                    <Icon name="Search" className="absolute left-3 top-2.5 w-4 h-4 text-slate-400" />
                                    <input 
                                        type="text" 
                                        placeholder="Modell oder Art.Nr. suchen..." 
                                        className="w-full bg-slate-100 rounded-xl pl-10 pr-4 py-2.5 font-bold text-sm outline-none focus:ring-2 ring-green-600 transition-all border-none"
                                        value={searchTerm}
                                        onChange={e => setSearchTerm(e.target.value)}
                                    />
                                </div>
                                <button onClick={() => setShowChat(!showChat)} className="bg-green-700 text-white p-2.5 rounded-xl shadow-lg hover:bg-green-800 active:scale-90 transition-all">
                                    <Icon name="Chat" />
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto p-6 md:p-10">
                        
                        {/* Mower Grid */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                            {filtered.map(m => (
                                <div key={m.id} onClick={() => setSelectedModel(m)} className="bg-white p-8 rounded-[2.5rem] shadow-sm border-2 border-transparent hover:border-green-600 hover:shadow-2xl cursor-pointer transition-all group flex flex-col justify-between">
                                    <div>
                                        <div className="flex justify-between items-start mb-6">
                                            <span className="text-[10px] font-black text-slate-400 bg-slate-50 px-2.5 py-1 rounded-full uppercase tracking-tighter">Art. {m.id}</span>
                                            <div className="bg-green-50 text-green-700 p-2 rounded-xl group-hover:rotate-12 transition-transform"><Icon name="Zap" className="w-5 h-5" /></div>
                                        </div>
                                        <h3 className="text-xl font-black text-slate-800 leading-tight group-hover:text-green-700 transition-colors mb-2">{m.name}</h3>
                                        <p className="text-xs text-slate-500 font-medium line-clamp-2 leading-relaxed mb-6">{m.description}</p>
                                    </div>
                                    <div className="flex justify-between items-center pt-6 border-t border-slate-50">
                                        <div className="text-2xl font-black text-slate-800">CHF {m.price}</div>
                                        <div className="bg-slate-100 p-1.5 rounded-full group-hover:bg-green-700 group-hover:text-white transition-all"><Icon name="Check" className="w-5 h-5" /></div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Detail Modal */}
                        {selectedModel && (
                            <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md flex items-center justify-center p-4 z-[200]">
                                <div className="bg-white rounded-[3.5rem] shadow-2xl overflow-hidden max-w-4xl w-full relative animate-slideUp border-4 border-white">
                                    <div className="p-8 md:p-14 bg-gradient-to-br from-white to-slate-50 border-b">
                                        <button onClick={() => setSelectedModel(null)} className="mb-10 text-[10px] font-black text-slate-400 hover:text-green-700 flex items-center gap-3 uppercase tracking-widest transition-all">← ZURÜCK</button>
                                        <h2 className="text-4xl md:text-7xl font-black tracking-tighter mb-8 leading-none">{selectedModel.fullName}</h2>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                            {Object.entries(selectedModel.specs).map(([k,v]) => (
                                                <div key={k} className="bg-white border-2 border-slate-100 p-4 rounded-2xl shadow-sm">
                                                    <div className="text-[9px] font-black text-slate-300 uppercase tracking-widest mb-1">{k}</div>
                                                    <div className="font-bold text-sm text-slate-700">{v}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="p-10 md:p-14 grid grid-cols-1 md:grid-cols-2 gap-10">
                                        <div className="bg-slate-900 text-white p-10 rounded-[3rem] shadow-xl relative overflow-hidden">
                                            <div className="absolute -right-10 -bottom-10 text-slate-800 opacity-20 transform rotate-12"><Icon name="Shield" className="w-64 h-64" /></div>
                                            <h4 className="text-xl font-black text-green-500 mb-6 uppercase tracking-widest underline decoration-green-500/30">Wartung & Start</h4>
                                            <p className="text-slate-300 text-lg leading-relaxed font-medium mb-8 relative z-10">{selectedModel.setup}</p>
                                            <div className="flex items-center gap-2 text-[10px] font-black uppercase text-green-400 bg-green-900/50 px-3 py-1 rounded-full w-fit">
                                                <Icon name="Check" className="w-3 h-3" /> Verifiziert
                                            </div>
                                        </div>
                                        <div>
                                            <h4 className="font-black text-xs uppercase tracking-[0.3em] text-slate-400 mb-8">Zubehör & Betriebsstoffe</h4>
                                            <div className="space-y-4">
                                                <div className="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                                                    <div className="text-[9px] font-black text-green-700 uppercase mb-1">Motorenöl / Energie</div>
                                                    <div className="font-black text-slate-800">{selectedModel.oil}</div>
                                                </div>
                                                <div className="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                                                    <div className="text-[9px] font-black text-green-700 uppercase mb-1">Kraftstoff</div>
                                                    <div className="font-black text-slate-800">{selectedModel.fuel}</div>
                                                </div>
                                                <div className="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                                                    <div className="text-[9px] font-black text-green-700 uppercase mb-1">Ersatzteile</div>
                                                    <div className="font-black text-slate-800 text-sm">{JSON.stringify(selectedModel.consumables).replace(/[{}]/g, '')}</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Chat Bot UI */}
                        {showChat && (
                            <div className="fixed bottom-6 right-6 w-[calc(100%-3rem)] max-w-md bg-white rounded-[2.5rem] chat-shadow border-4 border-green-700 overflow-hidden z-[100] animate-slideUp flex flex-col h-[600px]">
                                <div className="bg-green-700 p-5 text-white font-black flex justify-between items-center shadow-lg">
                                    <div className="flex items-center gap-2 uppercase tracking-widest text-xs">
                                        <div className="w-2.5 h-2.5 bg-green-400 rounded-full animate-pulse shadow-[0_0_10px_#4ade80]"></div>
                                        KI-Fachberater Aktiv
                                    </div>
                                    <button onClick={() => setShowChat(false)} className="hover:rotate-90 transition-transform"><Icon name="X" className="w-5 h-5" /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar bg-[#f8fafc]">
                                    {chatHistory.map((msg, i) => (
                                        <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`p-4 rounded-3xl text-sm font-medium leading-relaxed max-w-[85%] shadow-sm ${msg.role === 'user' ? 'bg-green-600 text-white rounded-tr-none' : 'bg-white border border-slate-200 rounded-tl-none text-slate-700'}`}>
                                                {msg.text}
                                            </div>
                                        </div>
                                    ))}
                                    {isTyping && <div className="text-[10px] font-black text-green-600 uppercase tracking-widest animate-pulse ml-2 flex items-center gap-1">
                                        <Icon name="Zap" className="w-3 h-3" /> Experte überlegt...
                                    </div>}
                                    <div ref={chatEndRef} />
                                </div>
                                <div className="p-5 bg-white border-t-2 border-slate-50 flex gap-3">
                                    <input 
                                        value={userInput} 
                                        onChange={e => setUserInput(e.target.value)} 
                                        onKeyPress={e => e.key === 'Enter' && handleSend()} 
                                        placeholder="Frag nach Öl, Messer oder Hilfe..." 
                                        className="flex-1 bg-slate-50 border-2 border-slate-100 rounded-2xl px-5 py-3 outline-none focus:border-green-600 font-medium transition-all" 
                                    />
                                    <button onClick={handleSend} className="bg-green-700 text-white p-4 rounded-2xl shadow-lg hover:bg-green-800 transition-colors active:scale-90">
                                        <Icon name="Send" className="w-5 h-5" />
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer Badge */}
                    <div className="fixed bottom-6 left-6 hidden md:flex items-center gap-3 bg-white/80 backdrop-blur-md px-5 py-2.5 rounded-2xl border border-slate-200 shadow-sm">
                        <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Systemstatus: Optimal // Buchsi 2026</span>
                    </div>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
